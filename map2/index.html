
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tartu map application</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="css/appStyle.css">
  </head>
  <body>
    <div class="map-title">Tartu map application</div>
    <button class="default-button" onclick="defaultMapSettings()">Default view</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-choropleth@1.1.4/dist/choropleth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-vector-tile-layer@0.11.0/dist/VectorTileLayer.umd.min.js"></script>

    <style>
      body { margin: 0; padding: 0; }
      #map { width: 100%; height: 100vh; }
    </style>

    <script src="js/appCode.js"></script>

    <script type="module">
      import styling from "js/styles.js"
      const map = L.map('map').setView([58.373523, 26.716045], 10)

      const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      })

      const Stadia_AlidadeSmooth = L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.{ext}', {
        minZoom: 0,
        maxZoom: 20,
        attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_y; <a href="https://openmaptiles.org/" target&copy; <a href="https://www.openstreetopyrightOpenStreetMap</a> contributors',
        ext: 'png'
      })

      Stadia_AlidadeSmooth.addTo(map)

      const vectorTileLayerStyle = {
        style: styling.styles.vectorTileStyle,
      }
      
      // Hytruck suitability layer
      const vectorTileUrl = 'https://hytruck.landscape-geoinformatics.eu/tiles-api/v1/00000000-0000-0000-0000-000000000000@AHP%20Default%20Settings@-1/{z}/{x}/{y}'
      const vectorLayer = VectorTileLayer(vectorTileUrl, vectorTileLayerStyle)
    
      // Joonatan's forest layer
      const foresturl = "https://data-apps.landscape-geoinformatics.org/e_305_puittaimestik_a/{z}/{x}/{y}"
      const forestLayer = VectorTileLayer(foresturl, vectorTileLayerStyle)
      forestLayer.addTo(map)
    </script>
  </body>
</html>
